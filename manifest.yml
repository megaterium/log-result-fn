function:
  name: LogResultFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Logs a processing summary for audit and tracking.
    Records file metadata, parsing counts, validation result, and webhook status.
  timeout: 30
  memory_size: 256

  layers:
    - foundationMinimal
    - foundationApi

  parameters:
    required: []

    optional:
      - name: parsed_statement_file_uuid
        type: string
        description: UUID of parsed_statement.json from ParseStatementFn
      - name: validation_result_file_uuid
        type: string
        description: UUID of validation_result.json from ValidateRulesFn
      - name: webhook_result_file_uuid
        type: string
        description: UUID of webhook_result.json from SendWebhookFn
      - name: verbose
        type: boolean
        description: Enable verbose logging
        default: false

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false
