function:
  name: LogResultFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Logs a processing summary for audit and tracking.
    Records file metadata, parsing counts, validation result, and webhook status.
  timeout: 30
  memory_size: 256

  layers:
    - foundationMinimal
    - foundationApi

  parameters:
    required: []

    optional:
      - name: statement_file_uuid
        type: string
        description: UUID of the parsed statement JSON file
      - name: validation_file_uuid
        type: string
        description: UUID of the validation result JSON file
      - name: webhook_file_uuid
        type: string
        description: UUID of the webhook result JSON file
      - name: verbose
        type: boolean
        description: Enable verbose logging
        default: false

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false
